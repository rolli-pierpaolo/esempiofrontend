<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet"
          crossorigin="anonymous">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            crossorigin="anonymous"></script>

    <title>List Socio</title>
</head>

<body>

<div class="container mt-4">

    <table class="table table-secondary text-center" style="width:60%; text-align: center">

        <thead>
        <tr>
            <th>Nome</th>
            <th>Cognome</th>
            <th>Email</th>
            <th>Codice Fiscale</th>
        </tr>
        </thead>

        <tbody>

        <tr th:each="socio : ${listsocio}">
            <td th:text="${socio.nome}"></td>
            <td th:text="${socio.cognome}"></td>
            <td th:text="${socio.email}"></td>
            <td th:text="${socio.codiceFiscale}"></td>
            <td>
            <span th :text="${socio.certificato}!=null"?${socio.certificato.tipo}: 'senza'"></span>
            </td>
        </tr>

        </tbody>

    </table>

</div>

</body>
</html>
